<!-- Theme toggle — fixed top-right -->
<button
  (click)="themeService.toggle()"
  class="fixed top-4 right-4 z-50 p-2 rounded-lg transition-colors"
  style="background-color: var(--color-surface); border: 1px solid var(--color-border); color: var(--color-text-muted)"
  [title]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
>
  @if (themeService.isDark()) {
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
    </svg>
  } @else {
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
    </svg>
  }
</button>

<div class="min-h-screen flex items-center justify-center bg-[var(--color-bg)] px-4">
  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="/icons/CardVault_logo.svg" alt="CardVault" class="w-36 h-36 mx-auto mb-4 rounded-3xl" />
    </div>

    <!-- Card -->
    <div class="card-surface p-8 space-y-6">

      @if (submitted()) {
        <!-- Success state -->
        <div class="text-center py-4 space-y-4">
          <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-green-100 dark:bg-green-900/30">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-green-600 dark:text-green-400" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
          </div>
          <div>
            <p class="font-semibold" style="color: var(--color-text)">Check your inbox</p>
            <p class="text-sm mt-1" style="color: var(--color-text-muted)">
              If this email exists in our system, you will receive a password reset link within a few minutes.
            </p>
          </div>
          <a routerLink="/login" class="btn-primary inline-block px-6 py-2 text-sm">
            Back to sign in
          </a>
        </div>

      } @else {

        @if (errorMessage()) {
          <div class="flex items-start gap-3 rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700
                      dark:border-red-800 dark:bg-red-900/20 dark:text-red-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="mt-0.5 h-4 w-4 shrink-0" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <span>{{ errorMessage() }}</span>
          </div>
        }

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5" novalidate>
          <div>
            <label for="email" class="block text-sm font-medium mb-1" style="color: var(--color-text)">Email address</label>
            <input
              id="email"
              type="email"
              formControlName="email"
              class="input-base"

              placeholder="you@example.com"
              autocomplete="email"
            />
          </div>

          <button
            type="submit"
            class="btn-primary w-full py-2.5 flex items-center justify-center gap-2"
            [disabled]="loading() || form.invalid"
          >
            @if (loading()) {
              <svg class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              Sending...
            } @else {
              Send reset link
            }
          </button>
        </form>

        <p class="text-center text-sm" style="color: var(--color-text-muted)">
          Remember your password?
          <a routerLink="/login" class="font-semibold hover:underline" style="color: var(--color-primary)">Sign in</a>
        </p>
      }
    </div>
  </div>
</div>
