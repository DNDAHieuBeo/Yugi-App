<div class="flex h-screen overflow-hidden" style="background-color: var(--color-bg)">

  <!-- Sidebar (desktop) -->
  <aside class="hidden md:flex flex-col w-60 shrink-0 border-r"
         style="background-color: var(--color-surface); border-color: var(--color-border)">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-5 py-5 border-b" style="border-color: var(--color-border)">
      <img src="/icons/CardVault_logo.svg" alt="CardVault" class="w-9 h-9 rounded-xl" />
      <span class="text-lg font-bold tracking-tight"
            style="background: linear-gradient(135deg, var(--color-primary), #5de8b5);
                   -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                   background-clip: text;">
        CardVault
      </span>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a routerLink="/cards" routerLinkActive="nav-active"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        Card Browser
      </a>

      <a routerLink="/collection" routerLinkActive="nav-active"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
        </svg>
        My Collection
      </a>

      <a routerLink="/decks" routerLinkActive="nav-active"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
        Decks
      </a>

      <a routerLink="/duel" routerLinkActive="nav-active"
         class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758a3 3 0 10-4.243 4.243 3 3 0 004.243-4.243zm0-5.758a3 3 0 10-4.243-4.243 3 3 0 004.243 4.243z"/>
        </svg>
        Duel
      </a>
    </nav>

    <!-- Bottom: user + theme toggle + logout -->
    <div class="px-3 pb-4 space-y-1 border-t pt-3" style="border-color: var(--color-border)">
      <!-- Theme toggle -->
      <button (click)="themeService.toggle()"
              class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors">
        @if (themeService.isDark()) {
          <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
          </svg>
          Light mode
        } @else {
          <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
          Dark mode
        }
      </button>

      <!-- User info — click to open profile -->
      <button (click)="openProfile()"
              class="nav-link w-full flex items-center gap-3 px-3 py-2 rounded-lg transition-colors text-left">
        <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0"
             style="background: linear-gradient(135deg, var(--color-primary), #5de8b5)">
          {{ userInitial() }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium truncate" style="color: var(--color-text)">
            {{ authService.currentUser()?.username }}
          </p>
          <p class="text-xs truncate" style="color: var(--color-text-muted)">
            Edit profile
          </p>
        </div>
        <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"
             style="color: var(--color-text-muted)">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
      </button>

      <!-- Logout -->
      <button (click)="askLogout()"
              class="nav-link w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-red-500 hover:text-red-400">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- Mobile top bar -->
  <div class="md:hidden fixed top-0 left-0 right-0 z-40 flex items-center justify-between px-4 h-14 border-b"
       style="background-color: var(--color-surface); border-color: var(--color-border)">
    <div class="flex items-center gap-2">
      <img src="/icons/CardVault_logo.svg" alt="CardVault" class="w-8 h-8 rounded-lg" />
      <span class="font-bold text-sm"
            style="background: linear-gradient(135deg, var(--color-primary), #5de8b5);
                   -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                   background-clip: text;">
        CardVault
      </span>
    </div>
    <div class="flex items-center gap-2">
      <button (click)="themeService.toggle()" class="p-2 rounded-lg" style="color: var(--color-text-muted)">
        @if (themeService.isDark()) {
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
        }
      </button>
      <button (click)="askLogout()" class="p-2 rounded-lg text-red-500">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto md:pt-0 pt-14">
    <router-outlet />
  </main>

  <!-- Profile dialog -->
  <app-profile-dialog #profileDialog />

  <!-- Sign-out confirm dialog -->
  <app-dialog
    #logoutDialog
    title="Sign out"
    message="Are you sure you want to sign out?"
    confirmLabel="Sign out"
    cancelLabel="Cancel"
    [confirmDanger]="true"
    (confirmed)="confirmLogout()"
  />

  <!-- Mobile bottom nav -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 z-40 flex border-t"
       style="background-color: var(--color-surface); border-color: var(--color-border)">
    <a routerLink="/cards" routerLinkActive="mobile-nav-active"
       class="mobile-nav flex-1 flex flex-col items-center gap-1 py-2 text-xs font-medium transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      Cards
    </a>
    <a routerLink="/collection" routerLinkActive="mobile-nav-active"
       class="mobile-nav flex-1 flex flex-col items-center gap-1 py-2 text-xs font-medium transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
      </svg>
      Collection
    </a>
    <a routerLink="/decks" routerLinkActive="mobile-nav-active"
       class="mobile-nav flex-1 flex flex-col items-center gap-1 py-2 text-xs font-medium transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
      </svg>
      Decks
    </a>
    <a routerLink="/duel" routerLinkActive="mobile-nav-active"
       class="mobile-nav flex-1 flex flex-col items-center gap-1 py-2 text-xs font-medium transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M14.121 14.121L19 19m-7-7l7-7m-7 7l-2.879 2.879M12 12L9.121 9.121m0 5.758a3 3 0 10-4.243 4.243 3 3 0 004.243-4.243zm0-5.758a3 3 0 10-4.243-4.243 3 3 0 004.243 4.243z"/>
      </svg>
      Duel
    </a>
  </nav>

</div>
